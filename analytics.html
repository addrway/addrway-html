<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway Analytics</title><link rel="stylesheet" href="styles.css"/><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-logo">A</div><div><h1>Addrway</h1><p>Admin Command Center</p></div></div><nav class="nav" id="nav"></nav><div class="sidebar-card"><div class="muted" style="font-size:.9rem">Signed in as</div><div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div><div class="note" id="sidebarNote" style="margin-top:8px"></div><div class="footer-note"><button class="btn" onclick="logout()">Log out</button></div></div></aside><main class="content"><div class="topbar"><div><div class="eyebrow">Analytics</div><h2>Usage analytics</h2><div class="muted">Simple trend pages you can expand later with Supabase data.</div></div></div><section class="grid two-col"><div class="card panel-pad"><h3 class="section-title">User Growth</h3><canvas id="growthChart"></canvas></div><div class="card panel-pad"><h3 class="section-title">Plan Mix</h3><canvas id="planChart"></canvas></div></section></main></div><script src="app.js"></script><script>const me=requireAuth("admin");if(me){document.getElementById("nav").innerHTML=navHTML("Analytics");sidebarName.textContent=me.name;sidebarNote.textContent=me.role==="admin"?"Your private overview of users, traffic, and address activity.":"Your workspace for address checks and history.";}</script><script>const dba=getDB(),pc={Free:0,Pro:0,Business:0};dba.users.filter(u=>u.role!=="admin").forEach(u=>pc[u.plan]=(pc[u.plan]||0)+1);new Chart(document.getElementById("growthChart"),{type:"bar",data:{labels:["Week 1","Week 2","Week 3","Week 4"],datasets:[{label:"New Users",data:[3,5,4,7],backgroundColor:"rgba(34,211,238,.65)"}]},options:{responsive:true,plugins:{legend:{labels:{color:"#cbd5e1"}}},scales:{x:{ticks:{color:"#94a3b8"},grid:{color:"rgba(148,163,184,.08)"}},y:{ticks:{color:"#94a3b8"},grid:{color:"rgba(148,163,184,.08)"}}}}});new Chart(document.getElementById("planChart"),{type:"pie",data:{labels:Object.keys(pc),datasets:[{data:Object.values(pc),backgroundColor:["#fbbf24","#22d3ee","#34d399"]}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#cbd5e1"}}}}});</script></body></html>
