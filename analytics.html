<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Addrway Analytics</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div>
          <h1>Addrway</h1>
          <p>Admin Command Center</p>
        </div>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-card">
        <div class="muted" style="font-size:.9rem">Signed in as</div>
        <div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div>
        <div class="note" id="sidebarNote" style="margin-top:8px"></div>
        <div class="footer-note">
          <button class="btn" id="logoutBtn">Log out</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <div class="eyebrow">Analytics</div>
          <h2>Usage analytics</h2>
          <div class="muted">Simple trend pages you can expand later with Supabase data.</div>
        </div>
      </div>

      <section class="grid two-col">
        <div class="card panel-pad">
          <h3 class="section-title">User Growth</h3>
          <canvas id="growthChart"></canvas>
        </div>

        <div class="card panel-pad">
          <h3 class="section-title">Plan Mix</h3>
          <canvas id="planChart"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>

  <script>
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ADMIN_EMAIL = "lumen-bridge@outlook.com";

    let me = null;

    async function checkAdminAccess() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        window.location.href = "login.html";
        return false;
      }

      const user = data.user;
      const userEmail = (user.email || "").toLowerCase().trim();

      if (userEmail !== ADMIN_EMAIL.toLowerCase()) {
        alert("Access denied. This page is restricted.");
        window.location.href = "https://addrway-site.vercel.app";
        return false;
      }

      me = {
        id: user.id,
        email: user.email,
        name: user.user_metadata?.full_name || user.user_metadata?.name || "Luis",
        role: "admin"
      };

      return true;
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    }

    function safeNavHTML() {
      if (typeof navHTML === "function") return navHTML("Analytics");

      return `
        <a href="admin.html">Dashboard</a>
        <a href="admin-users.html">Users</a>
        <a href="admin-lookups.html">Lookups</a>
        <a href="analytics.html" class="active">Analytics</a>
      `;
    }

    async function initAnalyticsPage() {
      const allowed = await checkAdminAccess();
      if (!allowed) return;

      document.getElementById("nav").innerHTML = safeNavHTML();
      document.getElementById("sidebarName").textContent = me.name;
      document.getElementById("sidebarNote").textContent =
        "Your private overview of users, traffic, and address activity.";

      document.getElementById("logoutBtn").addEventListener("click", async function () {
        await logout();
      });

      const dba = getDB();
      const pc = { Free: 0, Pro: 0, Business: 0 };

      dba.users
        .filter(u => u.role !== "admin")
        .forEach(u => {
          pc[u.plan] = (pc[u.plan] || 0) + 1;
        });

      new Chart(document.getElementById("growthChart"), {
        type: "bar",
        data: {
          labels: ["Week 1", "Week 2", "Week 3", "Week 4"],
          datasets: [{
            label: "New Users",
            data: [3, 5, 4, 7],
            backgroundColor: "rgba(34,211,238,.65)"
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: "#cbd5e1" }
            }
          },
          scales: {
            x: {
              ticks: { color: "#94a3b8" },
              grid: { color: "rgba(148,163,184,.08)" }
            },
            y: {
              ticks: { color: "#94a3b8" },
              grid: { color: "rgba(148,163,184,.08)" }
            }
          }
        }
      });

      new Chart(document.getElementById("planChart"), {
        type: "pie",
        data: {
          labels: Object.keys(pc),
          datasets: [{
            data: Object.values(pc),
            backgroundColor: ["#fbbf24", "#22d3ee", "#34d399"]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: "bottom",
              labels: { color: "#cbd5e1" }
            }
          }
        }
      });
    }

    window.addEventListener("load", initAnalyticsPage);
  </script>
</body>
</html>
