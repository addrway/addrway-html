<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Addrway Analytics</title>

  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>

<body>
  <div class="shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div>
          <h1>Addrway</h1>
          <p>Admin Command Center</p>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a href="admin.html">Dashboard</a>
        <a href="admin-users.html">Users</a>
        <a href="admin-lookups.html">Lookups</a>
        <a href="analytics.html" class="active">Analytics</a>
        <a href="billing.html">Billing</a>
      </nav>

      <div class="sidebar-card">
        <div class="muted">Signed in as</div>
        <div id="sidebarName" style="font-weight:700;margin-top:6px"></div>
        <div id="sidebarNote" class="note"></div>

        <div class="footer-note">
          <button class="btn" id="logoutBtn">Log out</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="content">

      <div class="topbar">
        <div>
          <div class="eyebrow">Analytics</div>
          <h2>Usage analytics</h2>
          <div class="muted">Simple trend pages you can expand later with real Supabase data.</div>
        </div>
      </div>

      <section class="grid two-col">

        <div class="card panel-pad">
          <h3>User Growth</h3>
          <canvas id="growthChart"></canvas>
        </div>

        <div class="card panel-pad">
          <h3>Plan Mix</h3>
          <canvas id="planChart"></canvas>
        </div>

      </section>

    </main>
  </div>

<script src="app.js"></script>

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_EMAIL = "lumen-bridge@outlook.com";

async function checkAdminAccess() {
  const { data } = await supabaseClient.auth.getUser();

  if (!data.user) {
    window.location.href = "login.html";
    return null;
  }

  const email = data.user.email.toLowerCase();

  if (email !== ADMIN_EMAIL.toLowerCase()) {
    window.location.href = "https://addrway-site.vercel.app";
    return null;
  }

  return data.user;
}

async function logoutSupabase() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

async function init() {
  const user = await checkAdminAccess();
  if (!user) return;

  document.getElementById("sidebarName").textContent = user.email;
  document.getElementById("sidebarNote").textContent = "Private CEO analytics view";

  document.getElementById("logoutBtn").onclick = logoutSupabase;

  const db = getDB();

  // PLAN MIX
  const planCounts = { Free:0, Pro:0, Business:0 };

  db.users
    .filter(u => u.role !== "admin")
    .forEach(u => {
      planCounts[u.plan] = (planCounts[u.plan] || 0) + 1;
    });

  // CHART 1 - GROWTH
  new Chart(document.getElementById("growthChart"), {
    type: "bar",
    data: {
      labels: ["Week 1","Week 2","Week 3","Week 4"],
      datasets: [{
        label: "New Users",
        data: [3,5,4,7],
        backgroundColor: "rgba(34,211,238,.65)"
      }]
    }
  });

  // CHART 2 - PLAN MIX
  new Chart(document.getElementById("planChart"), {
    type: "pie",
    data: {
      labels: Object.keys(planCounts),
      datasets: [{
        data: Object.values(planCounts),
        backgroundColor: ["#fbbf24","#22d3ee","#34d399"]
      }]
    }
  });
}

window.onload = init;
</script>

</body>
</html>
