<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Addrway Users</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div>
          <h1>Addrway</h1>
          <p>Admin Command Center</p>
        </div>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-card">
        <div class="muted" style="font-size:.9rem">Signed in as</div>
        <div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div>
        <div class="note" id="sidebarNote" style="margin-top:8px"></div>
        <div class="footer-note">
          <button class="btn" id="logoutBtn">Log out</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <div class="eyebrow">Users</div>
          <h2>User management</h2>
          <div class="muted">Review plans, status, and activity.</div>
        </div>
        <div class="right">
          <button class="btn btn-primary" id="addDemoUser">Add demo customer</button>
        </div>
      </div>

      <div class="card panel-pad">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Plan</th>
                <th>Status</th>
                <th>Lookups</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="userRows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>

  <script>
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ADMIN_EMAIL = "lumen-bridge@outlook.com";

    async function checkAdminAccess() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        window.location.href = "login.html";
        return null;
      }

      const user = data.user;
      const userEmail = (user.email || "").toLowerCase().trim();

      if (userEmail !== ADMIN_EMAIL.toLowerCase()) {
        alert("Access denied.");
        window.location.href = "dashboard.html";
        return null;
      }

      return user;
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    }

    function renderUsers() {
      const db = getDB();

      userRows.innerHTML = db.users.map(u => `
        <tr>
          <td><strong>${u.name}</strong></td>
          <td>${u.email}</td>
          <td>${u.role}</td>
          <td>${u.plan}</td>
          <td><span class="badge ${badgeClass(u.status)}">${u.status}</span></td>
          <td>${u.lookupsUsed.toLocaleString()}</td>
          <td>
            ${
              u.role === "admin"
                ? '<span class="muted">Owner</span>'
                : `<button class="btn" onclick="toggleUser('${u.id}')">Toggle Status</button>`
            }
          </td>
        </tr>
      `).join("");
    }

    function toggleUser(id) {
      const db = getDB();
      const u = db.users.find(x => x.id === id);
      if (!u) return;

      u.status = u.status === "Active" ? "Idle" : "Active";
      saveDB(db);
      renderUsers();
    }

    async function initPage() {
      const user = await checkAdminAccess();
      if (!user) return;

      document.getElementById("nav").innerHTML = navHTML("Users");
      document.getElementById("sidebarName").textContent =
        user.user_metadata?.full_name ||
        user.user_metadata?.name ||
        user.email ||
        "Admin";

      document.getElementById("sidebarNote").textContent =
        "Your private overview of users, traffic, and address activity.";

      document.getElementById("logoutBtn").addEventListener("click", async function () {
        await logout();
      });

      document.getElementById("addDemoUser").addEventListener("click", () => {
        const db = getDB();

        db.users.push({
          id: "u-" + Date.now(),
          name: "New Demo User",
          email: "new" + Date.now() + "@demo.com",
          password: "demo123",
          role: "customer",
          plan: "Free",
          status: "Active",
          lookupsUsed: 0,
          createdAt: new Date().toISOString()
        });

        saveDB(db);
        renderUsers();
      });

      renderUsers();
    }

    window.toggleUser = toggleUser;

    window.addEventListener("load", initPage);
  </script>
</body>
</html>
