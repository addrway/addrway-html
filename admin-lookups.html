<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Addrway Lookup Logs</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div>
          <h1>Addrway</h1>
          <p>Admin Command Center</p>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a href="admin.html">Dashboard</a>
        <a href="admin-users.html">Users</a>
        <a href="admin-lookups.html" class="active">Lookups</a>
        <a href="analytics.html">Analytics</a>
      </nav>

      <div class="sidebar-card">
        <div class="muted" style="font-size:.9rem">Signed in as</div>
        <div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div>
        <div class="note" id="sidebarNote" style="margin-top:8px"></div>
        <div class="footer-note">
          <button class="btn" id="logoutBtn">Log out</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <div class="eyebrow">Lookup logs</div>
          <h2>All lookup history</h2>
          <div class="muted">Every address check across the platform.</div>
        </div>
      </div>

      <div class="card panel-pad">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Address</th>
                <th>User ID</th>
                <th>Result</th>
                <th>Confidence</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="lookupRows">
              <tr>
                <td colspan="5" class="muted">Loading lookup logs...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ADMIN_EMAIL = "lumen-bridge@outlook.com";

    async function checkAdminAccess() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        window.location.href = "login.html";
        return null;
      }

      const user = data.user;
      const email = (user.email || "").toLowerCase().trim();

      if (email !== ADMIN_EMAIL) {
        window.location.href = "https://addrway-site.vercel.app";
        return null;
      }

      return user;
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getBadgeClass(status) {
      const s = (status || "").toLowerCase();
      if (s === "valid") return "badge valid";
      if (s === "partial") return "badge review";
      if (s === "no_match") return "badge invalid";
      return "badge";
    }

    async function loadLookups() {
      const tbody = document.getElementById("lookupRows");

      const { data, error } = await supabaseClient
        .from("address_searches")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(100);

      if (error) {
        console.error("Lookup load error:", error.message);
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="muted">Failed to load lookup logs.</td>
          </tr>
        `;
        return;
      }

      const rows = data || [];

      if (!rows.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="muted">No lookup logs found.</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = rows.map(row => `
        <tr>
          <td>
            <strong>${escapeHtml(row.normalized_address || row.address_line_1 || "Unknown address")}</strong>
          </td>
          <td>${escapeHtml(row.user_id || "—")}</td>
          <td><span class="${getBadgeClass(row.result_status)}">${escapeHtml(row.result_status || "unknown")}</span></td>
          <td>${row.confidence ?? "—"}</td>
          <td>${formatDate(row.created_at)}</td>
        </tr>
      `).join("");
    }

    document.getElementById("logoutBtn").addEventListener("click", async function () {
      await logout();
    });

    window.addEventListener("load", async () => {
      const user = await checkAdminAccess();
      if (!user) return;

      document.getElementById("sidebarName").textContent =
        user.user_metadata?.full_name || user.email || "Admin";

      document.getElementById("sidebarNote").textContent =
        "Your private overview of users, traffic, and address activity.";

      await loadLookups();
    });
  </script>
</body>
</html>
