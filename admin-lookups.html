<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway Lookup Logs</title><link rel="stylesheet" href="styles.css"/><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-logo">A</div><div><h1>Addrway</h1><p>Admin Command Center</p></div></div><nav class="nav" id="nav"></nav><div class="sidebar-card"><div class="muted" style="font-size:.9rem">Signed in as</div><div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div><div class="note" id="sidebarNote" style="margin-top:8px"></div><div class="footer-note"><button class="btn" onclick="logout()">Log out</button></div></div></aside><main class="content"><div class="topbar"><div><div class="eyebrow">Lookup logs</div><h2>All lookup history</h2><div class="muted">Every address check across the platform.</div></div><div class="right"><button class="btn" onclick="localStorage.removeItem('addrway_demo_db');location.reload()">Reset demo data</button></div></div><div class="card panel-pad"><div class="table-wrap"><table><thead><tr><th>Address</th><th>User</th><th>Result</th><th>Cached</th><th>Time</th></tr></thead><tbody id="lookupRows"></tbody></table></div></div></main></div><script src="app.js"></script><script>const me=requireAuth("admin");if(me){document.getElementById("nav").innerHTML=navHTML("Lookups");sidebarName.textContent=me.name;sidebarNote.textContent=me.role==="admin"?"Your private overview of users, traffic, and address activity.":"Your workspace for address checks and history.";}</script><script>const db2=getDB();lookupRows.innerHTML=db2.lookups.map(l=>`<tr><td><strong>${l.address}</strong></td><td>${userNameById(l.userId)}</td><td><span class="badge ${badgeClass(l.result)}">${l.result}</span></td><td>${l.cached?"Yes":"No"}</td><td>${formatTime(l.createdAt)}</td></tr>`).join("");</script></body></html>
