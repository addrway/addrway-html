<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway History</title><link rel="stylesheet" href="styles.css"/><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-logo">A</div><div><h1>Addrway</h1><p>Customer Workspace</p></div></div><nav class="nav" id="nav"></nav><div class="sidebar-card"><div class="muted" style="font-size:.9rem">Signed in as</div><div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div><div class="note" id="sidebarNote" style="margin-top:8px"></div><div class="footer-note"><button class="btn" onclick="logout()">Log out</button></div></div></aside><main class="content"><div class="topbar"><div><div class="eyebrow">History</div><h2>Your lookup history</h2><div class="muted">All searches for your account.</div></div></div><div class="card panel-pad"><div class="table-wrap"><table><thead><tr><th>Address</th><th>Result</th><th>Cached</th><th>Time</th></tr></thead><tbody id="historyRows"></tbody></table></div></div></main></div><script src="app.js"></script><script>const me=requireAuth(null);if(me){document.getElementById("nav").innerHTML=customerNavHTML("History");sidebarName.textContent=me.name;sidebarNote.textContent=me.role==="admin"?"Your private overview of users, traffic, and address activity.":"Your workspace for address checks and history.";}</script><script>const meH=requireAuth();if(meH){const rows=getDB().lookups.filter(l=>l.userId===meH.id);historyRows.innerHTML=rows.map(l=>`<tr><td><strong>${l.address}</strong></td><td><span class="badge ${badgeClass(l.result)}">${l.result}</span></td><td>${l.cached?"Yes":"No"}</td><td>${formatTime(l.createdAt)}</td></tr>`).join("")||`<tr><td colspan="4" class="muted">No history yet.</td></tr>`;}</script></body></html>
