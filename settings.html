<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway Settings</title><link rel="stylesheet" href="styles.css"/></head><body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-logo">A</div><div><h1>Addrway</h1><p id="roleLabel">Workspace</p></div></div><nav class="nav" id="nav"></nav><div class="sidebar-card"><div class="muted" style="font-size:.9rem">Signed in as</div><div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div><div class="note" id="sidebarNote" style="margin-top:8px"></div><div class="footer-note"><button class="btn" onclick="logout()">Log out</button></div></div></aside><main class="content"><div class="topbar"><div><div class="eyebrow">Settings</div><h2>Account settings</h2><div class="muted">Update your display information in this demo.</div></div></div><div class="card panel-pad"><form id="settingsForm" class="form-grid"><div class="field"><label>Name</label><input class="input" id="setName"/></div><div class="field"><label>Email</label><input class="input" id="setEmail"/></div><div class="field"><label>Plan</label><select class="select" id="setPlan"><option>Free</option><option>Pro</option><option>Business</option></select></div><div class="field"><label>Status</label><select class="select" id="setStatus"><option>Active</option><option>Idle</option><option>Near Limit</option></select></div><div><button class="btn btn-primary" type="submit">Save changes</button></div></form><p id="setMsg" class="note"></p></div></main></div><script src="app.js"></script><script>const me=requireAuth();if(me){roleLabel.textContent=me.role==="admin"?"Admin Command Center":"Customer Workspace";nav.innerHTML=me.role==="admin"?navHTML("Settings"):customerNavHTML("Settings");sidebarName.textContent=me.name;sidebarNote.textContent=me.role==="admin"?"Manage your admin profile.":"Manage your customer profile.";setName.value=me.name;setEmail.value=me.email;setPlan.value=me.plan;setStatus.value=me.status;}settingsForm.addEventListener("submit",e=>{e.preventDefault();const db=getDB(),me2=db.users.find(u=>u.id===currentUser().id);me2.name=setName.value.trim();me2.email=setEmail.value.trim();me2.plan=setPlan.value;me2.status=setStatus.value;saveDB(db);setMsg.textContent="Saved in demo storage.";sidebarName.textContent=me2.name;})</script></body></html>
