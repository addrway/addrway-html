<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway Lookup</title><link rel="stylesheet" href="styles.css"/><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-logo">A</div><div><h1>Addrway</h1><p>Customer Workspace</p></div></div><nav class="nav" id="nav"></nav><div class="sidebar-card"><div class="muted" style="font-size:.9rem">Signed in as</div><div id="sidebarName" style="font-size:1.15rem;font-weight:700;margin-top:6px"></div><div class="note" id="sidebarNote" style="margin-top:8px"></div><div class="footer-note"><button class="btn" onclick="logout()">Log out</button></div></div></aside><main class="content"><div class="topbar"><div><div class="eyebrow">Lookup</div><h2>Run a new address check</h2><div class="muted">This demo saves history locally and updates your usage instantly.</div></div></div><div class="card panel-pad"><form id="lookupForm" class="stack"><div class="field"><label>Street address</label><input class="input" id="addressInput" placeholder="1258 Maple Ave, Tampa, FL 33602" required/></div><div><button class="btn btn-primary" type="submit">Validate address</button></div></form><div id="lookupResult" style="margin-top:16px"></div></div></main></div><script src="app.js"></script><script>const me=requireAuth(null);if(me){document.getElementById("nav").innerHTML=customerNavHTML("Lookup");sidebarName.textContent=me.name;sidebarNote.textContent=me.role==="admin"?"Your private overview of users, traffic, and address activity.":"Your workspace for address checks and history.";}</script><script>lookupForm.addEventListener("submit",e=>{e.preventDefault();const me=requireAuth(),value=addressInput.value.trim();if(!value)return;const r=createLookup(value,me.id);lookupResult.innerHTML=`<div class="quick-item"><div style="font-weight:700">Lookup complete</div><div class="muted" style="margin-top:6px">${r.address}</div><div style="margin-top:10px" class="flex"><span class="badge ${badgeClass(r.result)}">${r.result}</span><span class="badge ${r.cached?"badge-good":"badge-neutral"}">${r.cached?"Cached Match":"Fresh Query"}</span></div></div>`;addressInput.value=""})</script></body></html>
