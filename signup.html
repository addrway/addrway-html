<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway Sign Up</title><link rel="stylesheet" href="styles.css"/></head><body><div class="auth-wrap"><div class="card auth-card"><div class="eyebrow">Create account</div><h2>Start using Addrway</h2><form id="signupForm" class="stack" style="margin-top:18px"><div class="field"><label>Full name</label><input class="input" id="name" required/></div><div class="field"><label>Email</label><input class="input" type="email" id="email" required/></div><div class="field"><label>Password</label><input class="input" type="password" id="password" required/></div><div class="field"><label>Plan</label><select id="plan" class="select"><option>Free</option><option>Pro</option><option>Business</option></select></div><button class="btn btn-primary" type="submit">Create account</button><a class="btn" href="login.html">Back to login</a></form><p id="msg" class="note"></p></div></div><script src="app.js"></script><script>seedDB();signupForm.addEventListener("submit",e=>{{e.preventDefault();const db=getDB();if(db.users.some(u=>u.email.toLowerCase()===email.value.toLowerCase())){{msg.textContent="That email already exists. Use login instead.";return;}}const user={{id:"u-"+Date.now(),name:name.value.trim(),email:email.value.trim(),password:password.value,role:"customer",plan:plan.value,status:"Active",lookupsUsed:0,createdAt:new Date().toISOString()}};db.users.push(user);saveDB(db);setSession(user);window.location.href="customer-dashboard.html";}})</script></body></html>
