<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Addrway Sign Up</title>

  <link rel="stylesheet" href="styles.css"/>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>

<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="eyebrow">Create account</div>
      <h2>Start using Addrway</h2>

      <form id="signupForm" class="stack" style="margin-top:18px">
        <div class="field">
          <label>Full name</label>
          <input class="input" id="name" required/>
        </div>

        <div class="field">
          <label>Email</label>
          <input class="input" type="email" id="email" required/>
        </div>

        <div class="field">
          <label>Password</label>
          <input class="input" type="password" id="password" required/>
        </div>

        <div class="field">
          <label>Plan</label>
          <select id="plan" class="select">
            <option>Free</option>
            <option>Pro</option>
            <option>Business</option>
          </select>
        </div>

        <button class="btn btn-primary" type="submit">Create account</button>
        <a class="btn" href="login.html">Back to login</a>
      </form>

      <p id="msg" class="note"></p>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ADMIN_EMAIL = "lumen-bridge@outlook.com";

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const plan = document.getElementById("plan").value;
      const msg = document.getElementById("msg");

      msg.textContent = "";

      if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
        msg.textContent = "This email is reserved for the admin account.";
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: name,
            plan: plan
          }
        }
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      localStorage.setItem("addrway_plan_name", plan);
      localStorage.setItem("addrway_plan_pill", plan);

      if (plan === "Free") {
        localStorage.setItem("addrway_sub_limit", "100");
      } else if (plan === "Pro") {
        localStorage.setItem("addrway_sub_limit", "1000");
      } else {
        localStorage.setItem("addrway_sub_limit", "5000");
      }

      localStorage.setItem("addrway_sub_used", "0");

      if (data.user && !data.session) {
        msg.textContent = "Account created. Check your email to confirm your signup, then log in.";
        return;
      }

      window.location.href = "customer-dashboard.html";
    });
  </script>
</body>
</html>
