<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Addrway Admin Login</title>

  <link rel="stylesheet" href="styles.css"/>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>

<body>

<div class="auth-wrap">
  <div class="card auth-card">

    <div class="eyebrow">Admin Access</div>
    <h2>Addrway Command Center</h2>

    <p class="muted">
      Authorized access only.
    </p>

    <form id="loginForm" class="stack" style="margin-top:18px">

      <div class="field">
        <label>Email</label>
        <input class="input" type="email" id="email" required/>
      </div>

      <div class="field">
        <label>Password</label>
        <input class="input" type="password" id="password" required/>
      </div>

      <button class="btn btn-primary" type="submit">
        Sign in
      </button>

    </form>

    <p id="msg" class="note"></p>

  </div>
</div>

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_EMAIL = "lumen-bridge@outlook.com";

// ---------- AUTO LOGIN ----------
window.addEventListener("load", async () => {
  const { data } = await supabaseClient.auth.getUser();

  if (data.user) {
    redirectUser(data.user);
  }
});

// ---------- LOGIN ----------
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("msg").textContent = error.message;
    return;
  }

  redirectUser(data.user);
});

// ---------- REDIRECT ----------
function redirectUser(user) {
  const email = (user.email || "").toLowerCase().trim();

  if (email === ADMIN_EMAIL.toLowerCase()) {
    window.location.href = "admin.html";
  } else {
    // 🚨 BLOCK NON-ADMIN USERS
    alert("Access denied.");
    window.location.href = "https://addrway-site.vercel.app";
  }
}
</script>

</body>
</html>
