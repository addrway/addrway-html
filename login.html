<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Addrway Login</title><link rel="stylesheet" href="styles.css"/></head><body><div class="auth-wrap"><div class="card auth-card"><div class="eyebrow">Welcome back</div><h2>Sign in to Addrway</h2><p class="muted">Admin demo: admin@addrway.com / admin123</p><form id="loginForm" class="stack" style="margin-top:18px"><div class="field"><label>Email</label><input class="input" type="email" id="email" required/></div><div class="field"><label>Password</label><input class="input" type="password" id="password" required/></div><button class="btn btn-primary" type="submit">Sign in</button><a class="btn" href="signup.html">Create account</a></form><p id="msg" class="note"></p></div></div><script src="app.js"></script><script>seedDB();const existing=currentUser();if(existing)window.location.href=existing.role==="admin"?"admin.html":"customer-dashboard.html";loginForm.addEventListener("submit",e=>{{e.preventDefault();const db=getDB();const user=db.users.find(u=>u.email.toLowerCase()===email.value.toLowerCase()&&u.password===password.value);if(!user){{msg.textContent="Invalid login. Try admin@addrway.com / admin123";return;}}setSession(user);window.location.href=user.role==="admin"?"admin.html":"customer-dashboard.html";}})</script></body></html>
