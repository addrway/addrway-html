<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Addrway Customer Dashboard</title>

  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>

<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">A</div>
      <div>
        <h1>Addrway</h1>
        <p>Customer Workspace</p>
      </div>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="sidebar-card">
      <div class="muted">Signed in as</div>
      <div id="sidebarName" style="font-weight:700;margin-top:6px"></div>
      <div class="note" id="sidebarNote"></div>

      <div class="footer-note">
        <button class="btn" id="logoutBtn">Log out</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="content">

    <div class="topbar">
      <div>
        <div class="eyebrow">Workspace</div>
        <h2>Your customer dashboard</h2>
        <div class="muted">Search, review history, and watch your usage.</div>
      </div>

      <div class="right">
        <button class="btn btn-primary" onclick="location.href='lookup.html'">
          New lookup
        </button>
      </div>
    </div>

    <!-- KPI -->
    <section class="grid kpi-grid">

      <div class="card panel-pad kpi">
        <p class="muted">Your Plan</p>
        <h3 id="planBox">Starter</h3>
      </div>

      <div class="card panel-pad kpi">
        <p class="muted">Lookups Used</p>
        <h3 id="usedBox">0</h3>
      </div>

      <div class="card panel-pad kpi">
        <p class="muted">Recent Result</p>
        <h3 id="resultBox">—</h3>
      </div>

      <div class="card panel-pad kpi">
        <p class="muted">Cached Hits</p>
        <h3 id="cachedBox">0</h3>
      </div>

    </section>

    <!-- HISTORY -->
    <div class="card panel-pad" style="margin-top:16px">

      <div class="spread">
        <div>
          <h3 class="section-title">Recent history</h3>
          <div class="muted">Your latest address checks</div>
        </div>

        <a class="btn" href="history.html">Open full history</a>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Address</th>
              <th>Result</th>
              <th>Cached</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="custRows">
            <tr><td colspan="4">Loading...</td></tr>
          </tbody>
        </table>
      </div>

    </div>

  </main>
</div>

<script src="app.js"></script>

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

// ---------- AUTH ----------
async function checkUser() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data.user) {
    window.location.href = "login.html";
    return null;
  }

  currentUser = data.user;
  return data.user;
}

// ---------- LOGOUT ----------
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

// ---------- LOAD UI ----------
function loadDemoData(user) {
  const db = getDB();

  // fallback demo mapping
  const demoUser = db.users[1]; // sample user

  const mine = db.lookups.filter(l => l.userId === demoUser.id);
  const last = mine[0];

  document.getElementById("planBox").textContent = demoUser.plan;
  document.getElementById("usedBox").textContent = demoUser.lookupsUsed.toLocaleString();
  document.getElementById("resultBox").textContent = last ? last.result : "—";
  document.getElementById("cachedBox").textContent =
    mine.filter(l => l.cached).length.toLocaleString();

  document.getElementById("custRows").innerHTML =
    mine.map(l => `
      <tr>
        <td><strong>${l.address}</strong></td>
        <td><span class="badge ${badgeClass(l.result)}">${l.result}</span></td>
        <td>${l.cached ? "Yes" : "No"}</td>
        <td>${formatTime(l.createdAt)}</td>
      </tr>
    `).join("") || `<tr><td colspan="4">No data</td></tr>`;
}

// ---------- INIT ----------
async function initPage() {
  const user = await checkUser();
  if (!user) return;

  document.getElementById("nav").innerHTML = customerNavHTML("Dashboard");

  document.getElementById("sidebarName").textContent =
    user.user_metadata?.full_name || user.email;

  document.getElementById("sidebarNote").textContent =
    "Your workspace for address checks and history.";

  document.getElementById("logoutBtn").addEventListener("click", logout);

  loadDemoData(user);
}

window.addEventListener("load", initPage);
</script>

</body>
</html>
